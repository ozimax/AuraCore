<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#26313d"/>
    </marker>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 28px Arial, sans-serif; fill: #17202a; }
      .note { font: 400 15px Arial, sans-serif; fill: #536170; }
      .box { stroke-width: 2.4; rx: 12; }
      .app { fill: #e9f5ff; stroke: #337ab7; }
      .agent { fill: #fff0f2; stroke: #c94f62; }
      .service { fill: #eef8f6; stroke: #3f8f80; }
      .data { fill: #f1edff; stroke: #7561c7; }
      .ai { fill: #edf7ed; stroke: #4e9f50; }
      .text { font: 700 20px Arial, sans-serif; fill: #17202a; }
      .sub { font: 400 14px Arial, sans-serif; fill: #44515f; }
      .line { stroke: #26313d; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .label { font: 700 13px Arial, sans-serif; fill: #26313d; }
    </style>
  </defs>

  <rect class="bg" width="1100" height="720"/>

  <text class="title" x="54" y="56">AuraCore.Engine Main Components</text>
  <text class="note" x="54" y="84">Simplified flow: console question enters the orchestrator, specialist agents retrieve context, chat client writes the answer.</text>

  <rect class="box app" x="70" y="150" width="210" height="95"/>
  <text class="text" x="116" y="190">Console App</text>
  <text class="sub" x="112" y="216">user asks question</text>

  <rect class="box agent" x="420" y="145" width="260" height="105"/>
  <text class="text" x="464" y="185">OrchestratorAgent</text>
  <text class="sub" x="470" y="213">routes to HR, Projects, or both</text>

  <rect class="box agent" x="250" y="345" width="230" height="95"/>
  <text class="text" x="327" y="385">HrAgent</text>
  <text class="sub" x="301" y="411">answers employee questions</text>

  <rect class="box agent" x="620" y="345" width="230" height="95"/>
  <text class="text" x="674" y="385">ProjectAgent</text>
  <text class="sub" x="661" y="411">answers project questions</text>

  <rect class="box service" x="120" y="525" width="230" height="95"/>
  <text class="text" x="179" y="565">TalentService</text>
  <text class="sub" x="177" y="591">searches HR data</text>

  <rect class="box service" x="750" y="525" width="230" height="95"/>
  <text class="text" x="802" y="565">VentureService</text>
  <text class="sub" x="804" y="591">searches project data</text>

  <rect class="box data" x="430" y="525" width="240" height="95"/>
  <text class="text" x="472" y="565">Vector Store</text>
  <text class="sub" x="470" y="591">SQLite employee + project data</text>

  <rect class="box ai" x="830" y="145" width="220" height="105"/>
  <text class="text" x="878" y="185">Chat Client</text>
  <text class="sub" x="864" y="213">Azure OpenAI model</text>

  <path class="line" d="M280 198 L420 198"/>
  <text class="label" x="316" y="184">question</text>

  <path class="line" d="M505 250 L395 345"/>
  <text class="label" x="398" y="304">HR route</text>

  <path class="line" d="M595 250 L705 345"/>
  <text class="label" x="666" y="304">project route</text>

  <path class="line" d="M680 198 L830 198"/>
  <text class="label" x="718" y="184">routing + synthesis</text>

  <path class="line" d="M365 440 L250 525"/>
  <path class="line" d="M235 525 L430 572"/>
  <text class="label" x="270" y="497">retrieve context</text>

  <path class="line" d="M735 440 L865 525"/>
  <path class="line" d="M750 572 L670 572"/>
  <text class="label" x="760" y="497">retrieve context</text>

  <path class="line" d="M480 392 C590 300, 742 238, 830 210"/>
  <path class="line" d="M620 392 C690 315, 775 258, 830 220"/>
  <text class="label" x="596" y="315">answer generation</text>

  <text class="note" x="54" y="680">Note: this uses your own agent classes plus a chat client, not ChatClientAgent sessions.</text>
</svg>
